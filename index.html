<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cedar Swamp DGL - Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,system-ui,sans-serif;background:#f4f7f6;color:#333}
        .header{background:#1A3A6B;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center}
        .nav{display:flex;background:#fff;border-bottom:1px solid #ddd;position:sticky;top:0;z-index:100}
        .nav button{flex:1;padding:15px;border:none;background:none;font-weight:600;color:#666;font-size:12px}
        .nav button.active{color:#1A3A6B;border-bottom:3px solid #1A3A6B}
        .screen{display:none;padding:15px}
        .screen.active{display:block}
        .card{background:#fff;border-radius:12px;padding:15px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
        table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
        th{text-align:left;padding:10px;background:#f8fafc;color:#64748b;font-weight:600}
        td{padding:10px;border-bottom:1px solid #f1f5f9}
        .btn{width:100%;padding:12px;border-radius:8px;border:none;font-weight:bold;cursor:pointer;margin-top:10px}
        .btn-prim{background:#1A3A6B;color:#fff}
        .btn-sec{background:#e2e8f0;color:#475569}
        .status-pill{font-size:10px;padding:4px 8px;border-radius:12px;background:rgba(255,255,255,0.2)}
    </style>
</head>
<body>

<div class="header">
    <div><h1>Cedar Swamp</h1><p style="font-size:10px">Advanced League Tracker</p></div>
    <span id="sync-status" class="status-pill">Local Mode</span>
</div>

<div class="nav">
    <button class="active" onclick="show('dash',this)">DASHBOARD</button>
    <button onclick="show('imp',this)">IMPORT</button>
    <button onclick="show('pay',this)">PAYOUTS</button>
    <button onclick="show('ros',this)">ROSTER</button>
</div>

<div id="dash" class="screen active">
    <div class="card">
        <h3>Season Stats</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">
            <div style="background:#f1f5f9;padding:15px;border-radius:8px">
                <small>Total Rounds</small>
                <div id="stat-rounds" style="font-size:24px;font-weight:bold">0</div>
            </div>
            <div style="background:#f1f5f9;padding:15px;border-radius:8px">
                <small>Ace Pot</small>
                <div id="stat-ace" style="font-size:24px;font-weight:bold;color:#16a34a">$0</div>
            </div>
        </div>
    </div>
</div>

<div id="imp" class="screen">
    <div class="card">
        <input type="file" id="fileIn" style="display:none" onchange="processRound(this)">
        <button class="btn btn-prim" onclick="document.getElementById('fileIn').click()">UPLOAD UDISC EXCEL</button>
        
        <div id="round-preview" style="display:none;margin-top:20px">
            <h3>Round Leaderboard (Net)</h3>
            <table id="leadTable">
                <thead><tr><th>Player</th><th>Raw</th><th>Hcp</th><th>Net</th></tr></thead>
                <tbody></tbody>
            </table>
            <button class="btn btn-prim" onclick="saveData()">CONFIRM & SAVE TO CLOUD</button>
        </div>
    </div>
</div>

<div id="pay" class="screen">
    <div class="card">
        <h3>Singles Payouts</h3>
        <div id="payout-content" style="margin-top:15px">Upload a round to see payouts.</div>
    </div>
</div>

<div id="ros" class="screen">
    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
            <h3>Player Roster</h3>
            <button class="btn btn-sec" style="width:auto;margin:0;padding:5px 10px" onclick="exportToCSV()">EXPORT TO SHEETS</button>
        </div>
        <table id="rosTable">
            <thead><tr><th>Player</th><th>Avg</th><th>Hcp</th><th>Rnds</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
const SUPABASE_URL='https://gwhffxlfhlssowrbcue.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3aGZmeGxmaGxsc3Nvd3JiY3VlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTkyNDQsImV4cCI6MjA5MDQ5NTI0NH0.pQd-bcVnBClKoz6WCo5n5pHGLo6Q41zRbe27ekZCxbQ';
let S = { rounds: [], players: {} };

async function loadData() {
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/league_data?id=eq.season_2026`, {
            headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY}
        });
        const d = await res.json();
        if(d?.[0]?.data) {
            S = d[0].data;
            updateUI();
            document.getElementById('sync-status').textContent = "Cloud Synced";
        }
    } catch(e) { console.error("Load failed"); }
}

function processRound(input) {
    const reader = new FileReader();
    reader.onload = e => {
        const wb = XLSX.read(e.target.result, {type:'array'});
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        const rawPlayers = rows.filter(r => r.round_total_score > 0);
        
        window.currentRound = rawPlayers.map(p => {
            const history = S.players[p.name]?.rounds || [];
            const avg = history.length ? history.reduce((a,b)=>a+b,0)/history.length : p.round_total_score;
            const hcp = Math.max(0, Math.floor((avg - 54) * 0.8)); // Example Handicap Logic
            return {
                name: p.name,
                raw: p.round_total_score,
                hcp: hcp,
                net: p.round_total_score - hcp
            };
        }).sort((a,b) => a.net - b.net);

        renderLeaderboard();
        calculatePayouts(window.currentRound.length);
        document.getElementById('round-preview').style.display = 'block';
    };
    reader.readAsArrayBuffer(input.files[0]);
}

function renderLeaderboard() {
    const body = document.getElementById('leadTable').querySelector('tbody');
    body.innerHTML = window.currentRound.map(p => `
        <tr><td>${p.name}</td><td>${p.raw}</td><td>-${p.hcp}</td><td><b>${p.net}</b></td></tr>
    `).join('');
}

function calculatePayouts(count) {
    const pool = count * 5;
    const p1 = (pool * 0.45).toFixed(2);
    const p2 = (pool * 0.33).toFixed(2);
    const p3 = (pool * 0.22).toFixed(2);
    document.getElementById('payout-content').innerHTML = `
        <p>Total Pool: $${pool.toFixed(2)}</p>
        <p>1st Place: $${p1}</p>
        <p>2nd Place: $${p2}</p>
        <p>3rd Place: $${p3}</p>
    `;
}

async function saveData() {
    if(!window.currentRound) return;
    S.rounds.push({ date: new Date().toLocaleDateString(), data: window.currentRound });
    window.currentRound.forEach(p => {
        if(!S.players[p.name]) S.players[p.name] = { rounds: [] };
        S.players[p.name].rounds.push(p.raw);
    });

    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/league_data`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Prefer': 'resolution=merge-duplicates' },
            body: JSON.stringify({ id: 'season_2026', data: S, updated_at: new Date() })
        });
        if(res.ok) { alert("Saved to Cloud!"); updateUI(); }
    } catch(e) { alert("Local save only - connection error."); }
}

function updateUI() {
    document.getElementById('stat-rounds').textContent = S.rounds.length;
    document.getElementById('stat-ace').textContent = "$" + (Object.values(S.players).reduce((a,b)=>a+b.rounds.length, 0));
    
    const rosBody = document.getElementById('rosTable').querySelector('tbody');
    rosBody.innerHTML = Object.entries(S.players).map(([name, data]) => {
        const avg = (data.rounds.reduce((a,b)=>a+b,0)/data.rounds.length).toFixed(1);
        const hcp = Math.max(0, Math.floor((avg - 54) * 0.8));
        return `<tr><td>${name}</td><td>${avg}</td><td>${hcp}</td><td>${data.rounds.length}</td></tr>`;
    }).join('');
}

function exportToCSV() {
    let csv = "Player,Average,Handicap,RoundsPlayed\n";
    Object.entries(S.players).forEach(([name, data]) => {
        const avg = (data.rounds.reduce((a,b)=>a+b,0)/data.rounds.length).toFixed(1);
        const hcp = Math.max(0, Math.floor((avg - 54) * 0.8));
        csv += `${name},${avg},${hcp},${data.rounds.length}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.setAttribute('hidden', '');
    a.setAttribute('href', url);
    a.setAttribute('download', 'CedarSwamp_Roster_Backup.csv');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function show(id, btn) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}

loadData();
</script>
</body>
</html>
