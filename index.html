<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedar Swamp DGL</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:14px}
  .header{background:#1A3A6B;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .header h1{font-size:17px;font-weight:600}
  .sync-status{font-size:11px;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,0.15);color:#fff}
  .sync-status.synced{background:rgba(100,255,100,0.2)}
  .sync-status.error{background:rgba(255,100,100,0.2)}
  .nav{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;overflow-x:auto;position:sticky;top:57px;z-index:99}
  .nav button{padding:12px 16px;font-size:12px;border:none;background:transparent;color:#666;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent}
  .nav button.active{color:#1A3A6B;border-bottom-color:#1A3A6B;font-weight:500}
  .screen{display:none;padding:16px;max-width:800px;margin:0 auto}.screen.active{display:block}
  .card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid #e8e8e8}
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
  .metric{background:#fff;border-radius:10px;padding:12px;text-align:center;border:1px solid #e8e8e8}
  .metric-n{font-size:20px;font-weight:600;color:#1A3A6B}
  .metric-l{font-size:10px;color:#888}
  .shdr{font-size:13px;font-weight:600;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{background:#f8f8f8;padding:8px;text-align:left;color:#666}
  td{padding:8px;border-bottom:1px solid #f5f5f5}
  .upload-zone{border:2px dashed #ccc;border-radius:12px;padding:30px;text-align:center;cursor:pointer;margin-bottom:12px;background:#fff}
  .fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .fg label{font-size:11px;color:#666;display:block;margin-bottom:4px}
  .fg input,.fg select{width:100%;height:36px;border:1px solid #ddd;border-radius:8px;padding:0 10px}
  .btn-ok{width:100%;padding:12px;background:#2e7d32;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer}
  .lock-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center}
  .lock-overlay.show{display:flex}
  .lock-box{background:#fff;border-radius:16px;padding:30px;width:320px;text-align:center}
  .lock-box input{width:100%;padding:12px;margin-bottom:12px;border:1px solid #ddd;border-radius:8px;text-align:center}
  .lock-box button{width:100%;padding:12px;background:#1A3A6B;color:#fff;border:none;border-radius:8px}
  .pnote{font-size:11px;color:#888;padding:10px;background:#f8f8f8;border-radius:8px;margin-top:10px}
  .unlocked-badge{font-size:11px;padding:4px 8px;background:#e8f5e9;color:#2e7d32;border-radius:6px}
  .locked-badge{font-size:11px;padding:4px 8px;background:#fff3e0;color:#e65100;border-radius:6px}
</style>
</head>
<body>

<div class="lock-overlay" id="lock-overlay">
  <div class="lock-box">
    <h2>League Access</h2>
    <p style="margin-bottom:15px;color:#666">Enter password to unlock editing</p>
    <input type="password" id="pw-input" placeholder="Password">
    <button onclick="checkPw()">Unlock</button>
  </div>
</div>

<div class="header">
  <div>
    <h1>Cedar Swamp DGL</h1>
    <p>2026 Season Dashboard</p>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="sync-status" class="sync-status">Connecting...</span>
    <span id="auth-badge" class="locked-badge" onclick="showPasswordModal()" style="cursor:pointer">Locked</span>
  </div>
</div>

<div class="nav">
  <button class="active" onclick="show('dashboard',this)">Dashboard</button>
  <button onclick="show('import',this)">Import</button>
  <button onclick="show('history',this)">History</button>
  <button onclick="show('roster',this)">Roster/Venmo</button>
  <button onclick="show('payout',this)">Payouts</button>
