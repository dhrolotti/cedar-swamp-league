<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedar Swamp DGL 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f5f5f5;font-size:14px}
  .header{background:#1A3A6B;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
  .sync-status{font-size:11px;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,0.1)}
  .sync-status.synced{background:#2e7d32;color:#fff}
  .nav{display:flex;background:#fff;border-bottom:1px solid #ddd;overflow-x:auto;position:sticky;top:58px;z-index:99}
  .nav button{padding:12px 15px;border:none;background:none;color:#666;cursor:pointer;font-size:12px}
  .nav button.active{color:#1A3A6B;border-bottom:2px solid #1A3A6B;font-weight:600}
  .screen{display:none;padding:15px;max-width:800px;margin:0 auto}
  .screen.active{display:block}
  .card{background:#fff;border-radius:10px;padding:15px;margin-bottom:15px;border:1px solid #eee}
  .metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:15px}
  .metric{background:#fff;padding:15px;text-align:center;border-radius:8px;border:1px solid #eee}
  .m-n{font-size:22px;font-weight:700;color:#1A3A6B}
  .btn-prim{width:100%;padding:12px;background:#1A3A6B;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer}
  table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
  th{text-align:left;padding:8px;background:#f9f9f9}
  td{padding:8px;border-bottom:1px solid #f0f0f0}
</style>
</head>
<body>

<div class="header">
  <div><h1>Cedar Swamp DGL</h1><p>2026 Season Opener</p></div>
  <span id="sync-status" class="sync-status">Connecting...</span>
</div>

<div class="nav">
  <button class="active" onclick="show('dash',this)">Dashboard</button>
  <button onclick="show('imp',this)">Import</button>
  <button onclick="show('pay',this)">Payouts</button>
  <button onclick="show('ros',this)">Roster</button>
</div>

<div id="dash" class="screen active">
  <div class="metrics">
    <div class="metric"><div class="m-n" id="m-r">0</div><div style="font-size:10px;color:#888">Rounds</div></div>
    <div class="metric"><div class="m-n" id="m-a">$0</div><div style="font-size:10px;color:#888">Ace Pot</div></div>
  </div>
  <div class="card">
    <div style="font-weight:600">Season History</div>
    <table id="hist-table"><thead><tr><th>Date</th><th>Players</th><th>Avg</th></tr></thead><tbody></tbody></table>
  </div>
</div>

<div id="pay" class="screen">
  <div class="card">
    <h3 id="payout-h">Payout Calculator</h3>
    <div id="payout-results" style="margin-top:15px">Upload a round to see splits.</div>
  </div>
</div>

<div id="imp" class="screen">
  <div class="card">
    <div style="border:2px dashed #ccc;padding:30px;text-align:center;border-radius:10px;cursor:pointer" onclick="document.getElementById('fin').click()">
      Tap to Upload UDisc Excel
    </div>
    <input type="file" id="fin" style="display:none" onchange="handleFile(this)">
    <div id="prev" style="display:none;margin-top:15px">
      <table id="p-list"><thead><tr><th>Player</th><th>Score</th><th>Fee</th></tr></thead><tbody></tbody></table>
      <button class="btn-prim" style="margin-top:15px" onclick="confirmImport()">Confirm & Save Round</button>
    </div>
  </div>
</div>

<div id="ros" class="screen">
  <div class="card"><table id="rt-body"><thead><tr><th>Player</th><th>Rounds</th></tr></thead><tbody></tbody></table></div>
</div>

<script>
const SUPABASE_URL='https://gwhffxlfhlssowrbcue.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3aGZmeGxmaGxsc3Nvd3JiY3VlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTkyNDQsImV4cCI6MjA5MDQ5NTI0NH0.pQd-bcVnBClKoz6WCo5n5pHGLo6Q41zRbe27ekZCxbQ';
let S={rounds:[],players:{},acePaidOut:0};

async function load(){
  try {
    const res=await fetch(`${SUPABASE_URL}/rest/v1/league_data?id=eq.season_2026`,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    const d=await res.json();
    if(d?.[0]?.data) S=d[0].data;
    render(); setStatus('Synced');
  } catch(e) { setStatus('Ready'); }
}

async function save(){
  setStatus('Saving...');
  const res = await fetch(`${SUPABASE_URL}/rest/v1/league_data`, {
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({id:'season_2026', data:S, updated_at:new Date()})
  });
  if(res.ok) setStatus('Synced'); else setStatus('Save Error');
}

function setStatus(m){ const el=document.getElementById('sync-status'); el.textContent=m; if(m==='Synced') el.classList.add('synced'); }

function render(){
  document.getElementById('m-r').textContent=S.rounds.length;
  document.getElementById('m-a').textContent='$'+(S.rounds.reduce((a,r)=>a+r.players.length,0)-S.acePaidOut);
  document.getElementById('hist-table').querySelector('tbody').innerHTML=S.rounds.map(r=>`<tr><td>${r.date}</td><td>${r.players.length}</td><td>${r.avg}</td></tr>`).join('');
  document.getElementById('rt-body').querySelector('tbody').innerHTML=Object.entries(S.players).map(([n,p])=>`<tr><td>${n}</td><td>${p.rounds.length}</td></tr>`).join('');
}

function handleFile(input){
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'array'});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    const players=rows.filter(r=>r.round_total_score>0).map(r=>({name:r.name,raw:r.round_total_score})).sort((a,b)=>a.raw-b.raw);
    
    document.getElementById('p-list').querySelector('tbody').innerHTML=players.map(p=>`<tr><td>${p.name}</td><td>${p.raw}</td><td>$6</td></tr>`).join('');
    document.getElementById('prev').style.display='block';
    
    const pool = players.length * 5; 
    const ace = players.length * 1;
    document.getElementById('payout-results').innerHTML = `
      <div style="background:#f0f7f0;padding:15px;border-radius:8px">
        <p><b>Day 1 Ace Pot:</b> $${ace}</p>
        <p><b>Payout Pool (Singles):</b> $${pool}</p><hr style="margin:10px 0">
        <p>1st Place: $${Math.round(pool*0.45)}</p>
        <p>2nd Place: $${Math.round(pool*0.33)}</p>
        <p>3rd Place: $${Math.round(pool*0.22)}</p>
      </div>
    `;
    window.pi={players, avg:(players.reduce((a,b)=>a+b.raw,0)/players.length).toFixed(1)};
  };
  reader.readAsArrayBuffer(input.files[0]);
}

function confirmImport(){
  S.rounds.push({date:new Date().toLocaleDateString(), players:window.pi.players, avg:window.pi.avg});
  window.pi.players.forEach(pl=>{
    if(!S.players[pl.name]) S.players[pl.name]={rounds:[],diffs:[],venmo:''};
    S.players[pl.name].rounds.push(pl.raw);
  });
  save(); render();
  document.getElementById('prev').style.display='none';
  alert('Day 1 Rounds Saved Successfully!');
}

function show(id,btn){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));document.getElementById(id).classList.add('active');btn.classList.add('active');}

load();
</script>
</body>
</html>
